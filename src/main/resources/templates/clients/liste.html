<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(~{::title}, ~{::section})}">
<head><title>Clients</title></head>
<body>
<section>

    <div class="page-header">
        <div class="page-header-left">
            <h1>Gestion des <em>Clients</em></h1>
            <p class="page-header-sub" th:text="${clients.size()} + ' client(s) enregistré(s)'">0 clients</p>
        </div>
        <a th:href="@{/clients/nouveau}" class="btn btn-indigo">
            <i class="fas fa-plus"></i> Nouveau Client
        </a>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-icon indigo"><i class="fas fa-users"></i></div>
            <div class="kpi-value" th:text="${clients.size()}">0</div>
            <div class="kpi-label">Total Clients</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon teal"><i class="fas fa-landmark"></i></div>
            <div class="kpi-value" th:text="${totalComptes}">0</div>
            <div class="kpi-label">Comptes Ouverts</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon emerald"><i class="fas fa-circle-check"></i></div>
            <div class="kpi-value">Actif</div>
            <div class="kpi-label">Statut du système</div>
        </div>
    </div>

    <div class="card">
        <div class="card-head">
            <span class="card-title">Liste des Clients</span>
            <form th:action="@{/clients}" method="get" style="display:flex;gap:8px;align-items:center;">
                <div class="search-box">
                    <i class="fas fa-magnifying-glass"></i>
                    <input type="text" name="search" placeholder="Rechercher un client…" th:value="${search}"/>
                </div>
                <button type="submit" class="btn btn-ghost btn-sm"><i class="fas fa-filter"></i> Filtrer</button>
                <a th:if="${search}" th:href="@{/clients}" class="btn btn-ghost btn-sm"><i class="fas fa-xmark"></i></a>
            </form>
        </div>

        <div class="tbl-wrap">
            <div th:if="${clients.isEmpty()}" class="empty-state">
                <i class="fas fa-users empty-state-icon"></i>
                <h3>Aucun client trouvé</h3>
                <p>Commencez par ajouter votre premier client.</p>
                <a th:href="@{/clients/nouveau}" class="btn btn-indigo" style="margin-top:18px;"><i class="fas fa-plus"></i> Ajouter un client</a>
            </div>

            <table th:unless="${clients.isEmpty()}">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Client</th>
                    <th>Téléphone</th>
                    <th>Adresse</th>
                    <th>Comptes</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client, stat : ${clients}">
                    <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-3);"
                        th:text="${stat.index + 1}">1</td>
                    <td>
                        <div class="client-cell">
                            <div class="avatar"
                                 th:text="${#strings.substring(client.prenom,0,1) + #strings.substring(client.nom,0,1)}">AB</div>
                            <div>
                                <div class="client-name" th:text="${client.nomComplet}">Nom Prénom</div>
                                <div class="client-meta" th:text="${client.email}">email@example.com</div>
                            </div>
                        </div>
                    </td>
                    <td style="color:var(--text-2);font-size:13px;"
                        th:text="${client.telephone != null ? client.telephone : '—'}">—</td>
                    <td style="color:var(--text-2);font-size:13px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                        th:text="${client.adresse != null ? client.adresse : '—'}">—</td>
                    <td>
                        <span class="badge badge-indigo"
                              th:text="${client.comptes.size()} + ' compte(s)'">0</span>
                    </td>
                    <td style="text-align:right;">
                        <div style="display:flex;gap:5px;justify-content:flex-end;align-items:center;">
                            <a th:href="@{/comptes/client/{id}(id=${client.id})}"
                               class="btn btn-outline-indigo btn-sm" title="Voir les comptes">
                                <i class="fas fa-eye"></i> Voir
                            </a>
                            <a th:href="@{/clients/modifier/{id}(id=${client.id})}"
                               class="btn btn-amber btn-sm" title="Modifier">
                                <i class="fas fa-pen"></i>
                            </a>
                            <a th:href="@{/comptes/nouveau/{id}(id=${client.id})}"
                               class="btn btn-ghost btn-sm" title="Ajouter un compte">
                                <i class="fas fa-plus"></i>
                            </a>
                            <a th:href="@{/clients/supprimer/{id}(id=${client.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Supprimer ce client définitivement ?')"
                               title="Supprimer">
                                <i class="fas fa-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
</body>
</html>
